<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e6f5c" />
    <link rel="icon" href="/icons/icon-192.svg" type="image/svg+xml" />
    <title>Sin conexion - Mi Natillera</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #f4efe6, #dfeee8);
        color: #16352c;
      }

      .card {
        width: min(92vw, 28rem);
        padding: 2rem;
        border-radius: 1.5rem;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 50px rgba(22, 53, 44, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
      }

      p {
        margin: 0 0 1.5rem;
        line-height: 1.5;
      }

      a {
        display: inline-block;
        padding: 0.85rem 1.2rem;
        border-radius: 999px;
        background: #1e6f5c;
        color: #fff;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sin conexion</h1>
      <p>No pudimos cargar la pagina. Revisa tu internet e intenta nuevamente.</p>
      <a href="/">Volver al inicio</a>
    </main>
  </body>
</html>
